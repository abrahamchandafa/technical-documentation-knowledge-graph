services:
  neo4j:
    image: neo4j:latest
    container_name: kg-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_memory_pagecache_size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - ./docker/neo4j/data:/data
      - ./docker/neo4j/logs:/logs
      - ./docker/neo4j/plugins:/plugins
      - ./docker/neo4j/import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  neodash:
    image: nielsdejong/neodash:latest
    container_name: kg-neodash
    ports:
      - "5005:5005"
    depends_on:
      neo4j:
        condition: service_healthy

# neodash connects to bolt://localhost:7687

  graphdb:
    image: ontotext/graphdb:10.8.0
    container_name: kg-graphdb
    ports:
      - "7200:7200"
    environment:
      GDB_JAVA_OPTS: >-
        -Xms1g -Xmx2g
      GDB_HEAP_SIZE: 2g
    volumes:
      - ./docker/graphdb/data:/opt/graphdb/home/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7200/rest/repositories"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s