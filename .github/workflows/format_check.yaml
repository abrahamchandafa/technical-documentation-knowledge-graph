name: Ruff Check
on: [ push, pull_request ]
jobs:
  ruff:
    name: Run ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Ruff Check
        uses: astral-sh/ruff-action@v3
      
      - name: Ruff Format
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"